services:
  - type: web
    name: bone-ai-frontend
    runtime: static
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: EXPO_PUBLIC_API_URL
        value: https://bone-ai-detection.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
